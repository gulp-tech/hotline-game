// --- ИГРОВОЙ ДВИЖОК (Ваш код) ---
const T=40;
function hx(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function rgb(r,g,b){return`rgb(${r|0},${g|0},${b|0})`}
function rgba(r,g,b,a){return`rgba(${r|0},${g|0},${b|0},${a})`}
function lp(a,b,t){return a+(b-a)*t}
function cL(a,b,t){t=Math.max(0,Math.min(1,t));return[lp(a[0],b[0],t)|0,lp(a[1],b[1],t)|0,lp(a[2],b[2],t)|0]}
function cl(v,l,h){return Math.max(l,Math.min(h,v))}
function ds(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1])}
function nm(v){const d=Math.hypot(v[0],v[1]);return d<.0001?[0,0]:[v[0]/d,v[1]/d]}
function rc(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function aD(a,b){let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d}
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function rr(x,y,w,h,r,f,s){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();if(f)ctx.fill();if(s)ctx.stroke()}
// ... (Здесь должен быть весь ваш остальной код классов, тем, генерации и т.д.) ...

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOTLINE HTML</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;width:100vw;}
canvas{display:block; image-rendering: pixelated;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Библиотека мультиплеера -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
// --- 1. ВСТАВЬТЕ СЮДА ВЕСЬ ВАШ ОРИГИНАЛЬНЫЙ КОД ИГРЫ ---
// (От "const canvas=..." до самого конца, где вызывается requestAnimationFrame)
// ВАЖНО: НЕ УДАЛЯЙТЕ ОРИГИНАЛЬНЫЙ КОД! Просто вставьте его здесь.


// --- 2. МУЛЬТИПЛЕЕР (ДОБАВЬТЕ ЭТО ПОСЛЕ ВАШЕГО КОДА) ---
const socket = io('https://hotline-game.onrender.com');
const otherPlayers = {};

socket.on('updatePlayer', (data) => { otherPlayers[data.id] = data; });
socket.on('playerLeft', (id) => { delete otherPlayers[id]; });

// Отправка координат на сервер
setInterval(() => {
  if(typeof G !== 'undefined' && G.pA) {
    socket.emit('playerMove', {x: G.px, y: G.py, angle: G.pa});
  }
}, 50);

// --- 3. ОПТИМИЗАЦИЯ И РИСОВАНИЕ ДРУГИХ ---
// Найдите функцию sts.game.draw() в вашем коде и внутри неё добавьте этот цикл:
/*
for(const id in otherPlayers){
    const p = otherPlayers[id];
    CR.draw(p.x-cam[0], p.y-cam[1], p.angle, '#f00', '#fff', '#f00', {mv:0});
}
*/

// Функция resize для оптимизации лагов
window.addEventListener('resize', () => {
    canvas.width = Math.min(window.innerWidth, 1920);
    canvas.height = Math.min(window.innerHeight, 1080);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
});
resize();

</script>
</body>
</html>

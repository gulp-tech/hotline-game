<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOTLINE HTML</title>
<style>
    body { background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; width:100vw; }
    canvas { display:block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
// Ждем полной загрузки страницы, чтобы canvas точно существовал
window.onload = function() {
    
    // --- 1. СЮДА ВСТАВЬТЕ ВЕСЬ ВАШ ОРИГИНАЛЬНЫЙ КОД (ВЕСЬ JS) ---
    // (начиная с const canvas=... и до конца)
    // ВАЖНО: Уберите оттуда вызов chg('menu') и requestAnimationFrame(loop) 
    // если они там есть, мы вызовем их ниже.

    // --- 2. МУЛЬТИПЛЕЕР (ДОБАВИТЬ ВНИЗУ) ---
    const socket = io('https://hotline-game.onrender.com');
    const otherPlayers = {};
    socket.on('updatePlayer', (data) => { otherPlayers[data.id] = data; });
    socket.on('playerLeft', (id) => { delete otherPlayers[id]; });

    setInterval(() => {
        if(typeof G !== 'undefined' && G.pA) {
            socket.emit('playerMove', {x: G.px, y: G.py, angle: G.pa});
        }
    }, 50);

    // --- 3. ФУНКЦИЯ ОПТИМИЗАЦИИ (ВМЕСТО ВАШЕЙ) ---
    window.addEventListener('resize', () => {
        let W = Math.min(window.innerWidth, 1920);
        let H = Math.min(window.innerHeight, 1080);
        canvas.width = W; canvas.height = H;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        if(cur && cur.name === 'menu') sts.menu._mk();
    });

    // --- 4. ЗАПУСК ---
    chg('menu');
    requestAnimationFrame(loop);
};
</script>
</body>
</html>

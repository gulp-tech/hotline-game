function hx(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function rgb(r,g,b){return`rgb(${r|0},${g|0},${b|0})`}
function rgba(r,g,b,a){return`rgba(${r|0},${g|0},${b|0},${a})`}
function lp(a,b,t){return a+(b-a)*t}
function cL(a,b,t){t=Math.max(0,Math.min(1,t));return[lp(a[0],b[0],t)|0,lp(a[1],b[1],t)|0,lp(a[2],b[2],t)|0]}
function cl(v,l,h){return Math.max(l,Math.min(h,v))}
function ds(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1])}
function nm(v){const d=Math.hypot(v[0],v[1]);return d<.0001?[0,0]:[v[0]/d,v[1]/d]}
function rc(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function aD(a,b){let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d}
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function rr(x,y,w,h,r,f,s){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();if(f)ctx.fill();if(s)ctx.stroke()}

let ac=null;

const keys={},mouse={x:W/2,y:H/2,btn:[0,0,0]};let evQ=[];

const Cfg={showFps:0};

// ═══ ENHANCED LEVEL THEMES ═══
const THEMES=[
{nm:'lobby',fl:[48,40,52],fv:5,fp:'marble',fc:[62,55,72],ac:[200,170,60],

{nm:'alley',fl:[32,38,32],fv:4,fp:'wetconcrete',fc:[42,48,42],ac:[0,200,80],
 wl:[52,62,52],wt:[68,78,68],ws:[32,38,32],wp:'dirtybrick',
 dw:[92,78,42],dm:[125,125,125],trim:[60,80,60],
 decals:['puddle','trash','crack'],ambColor:[100,200,150],ambInt:.03},
{nm:'office',fl:[52,38,28],fv:4,fp:'parquet',fc:[68,50,35],ac:[210,170,55],
 wl:[78,62,52],wt:[98,82,68],ws:[48,35,28],wp:'wallpaper',

{nm:'penthouse',fl:[58,48,58],fv:4,fp:'luxmarble',fc:[78,68,80],ac:[230,190,85],
 wl:[82,62,82],wt:[105,85,105],ws:[52,38,52],wp:'ornate',
 cpt:1,cc:[95,28,28],cb:[135,48,48],

 decals:['chandelier','statue','rug'],ambColor:[255,230,180],ambInt:.045},
{nm:'club',fl:[20,18,28],fv:3,fp:'checker',fc:[32,28,45],ac:[255,0,128],

{nm:'underground',fl:[32,24,20],fv:5,fp:'rustmetal',fc:[48,32,22],ac:[255,130,35],

 dw:[95,65,35],dm:[115,95,72],trim:[255,120,30],

function gTh(i){return THEMES[i%THEMES.length]}

// ═══ BEAUTIFUL FLOOR TEXTURES ═══
const flC={};
function gFloor(seed,li){
const k=seed*100+(li%THEMES.length);if(flC[k])return flC[k];
const c=document.createElement('canvas');c.width=T;c.height=T;
const cx=c.getContext('2d'),rn=mb(Math.abs(seed*2654435761)),th=gTh(li);
const f=th.fl,v=th.fv;
const br=f[0]+(rn()-.5)*v*2|0,bg=f[1]+(rn()-.5)*v*2|0,bb=f[2]+(rn()-.5)*v*2|0;
cx.fillStyle=rgb(br,bg,bb);cx.fillRect(0,0,T,T);
const fp=th.fp;
if(fp==='marble'||fp==='luxmarble'){
 // Marble veins with Perlin-like curves
 for(let i=0;i<4;i++){
  cx.strokeStyle=rgba(th.fc[0],th.fc[1],th.fc[2],.12+rn()*.08);
  cx.lineWidth=.3+rn()*.8;cx.beginPath();
  let x=rn()*T,y=rn()*T;cx.moveTo(x,y);
  for(let j=0;j<6;j++){x+=(rn()-.5)*15;y+=(rn()-.5)*15;
   cx.quadraticCurveTo(x+(rn()-.5)*8,y+(rn()-.5)*8,x,y)}
  cx.stroke()
 }
 // Subtle color patches
 for(let i=0;i<8;i++){
  const grd=cx.createRadialGradient(rn()*T,rn()*T,0,rn()*T,rn()*T,5+rn()*10);
  grd.addColorStop(0,rgba(br+8,bg+8,bb+8,.08));grd.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=grd;cx.fillRect(0,0,T,T)
 }
 if(fp==='luxmarble'){// Gold flecks
  for(let i=0;i<3;i++){cx.fillStyle=rgba(th.ac[0],th.ac[1],th.ac[2],.06);
   cx.beginPath();cx.arc(rn()*T,rn()*T,1+rn()*2,0,Math.PI*2);cx.fill()}}
 // Tile border
 cx.strokeStyle=rgba(br-10,bg-10,bb-10,.3);cx.lineWidth=1;cx.strokeRect(.5,.5,T-1,T-1);
 cx.fillStyle=rgba(255,255,255,.03);cx.fillRect(1,1,T-2,2)
}else if(fp==='parquet'){
 // Herringbone wood pattern
 const pw=10,ph=20;
 for(let y=-ph;y<T+ph;y+=ph){for(let x=-pw;x<T+pw;x+=pw*2){
  const dc=(rn()-.5)*8|0;const isAlt=((x/pw+y/ph)|0)%2;
  cx.fillStyle=rgb(br+dc+(isAlt?5:-3),bg+dc+(isAlt?3:-2),bb+dc);
  cx.save();cx.translate(x+pw/2,y+ph/2);ctx.rotate?0:0;
  cx.fillRect(-pw/2,-ph/2,pw-1,ph-1);
  // Wood grain
  cx.strokeStyle=rgba(br+dc+12,bg+dc+8,bb+dc+4,.1);cx.lineWidth=.3;
  for(let gy=-ph/2;gy<ph/2;gy+=3+rn()*2|0){cx.beginPath();cx.moveTo(-pw/2,gy);
   for(let gx=-pw/2;gx<pw/2;gx+=3)cx.lineTo(gx,gy+(rn()-.5)*.5);cx.stroke()}
  cx.restore()
 }}
 // Subtle floor wax sheen
 const sheen=cx.createLinearGradient(0,0,T,T);
 sheen.addColorStop(0,'rgba(255,255,255,.02)');sheen.addColorStop(.5,'rgba(255,255,255,.05)');
 sheen.addColorStop(1,'rgba(255,255,255,.02)');cx.fillStyle=sheen;cx.fillRect(0,0,T,T)
}else if(fp==='wetconcrete'){
 // Wet surface with reflections
 for(let i=0;i<25;i++){const dc=(rn()-.5)*10|0;
  cx.fillStyle=rgba(br+dc,bg+dc,bb+dc,.25);
  cx.beginPath();cx.arc(rn()*T,rn()*T,.5+rn()*2,0,Math.PI*2);cx.fill()}
 // Cracks
 if(rn()<.2){cx.strokeStyle=rgba(br-15,bg-15,bb-15,.2);cx.lineWidth=.5;
  cx.beginPath();let x=rn()*T,y=rn()*T;cx.moveTo(x,y);
  for(let j=0;j<4+rn()*5|0;j++){x+=(rn()-.5)*12;y+=(rn()-.5)*12;cx.lineTo(x,y)}cx.stroke()}
 // Wet puddle shimmer
 if(rn()<.1){const grd=cx.createRadialGradient(rn()*T,rn()*T,0,rn()*T,rn()*T,8+rn()*8);
  grd.addColorStop(0,rgba(th.ac[0],th.ac[1],th.ac[2],.04));grd.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=grd;cx.fillRect(0,0,T,T)}
}else if(fp==='diamondplate'){
 for(let y=0;y<T;y+=8)for(let x=(y%16?4:0);x<T;x+=8){
  cx.fillStyle=rgba(br+8,bg+8,bb+8,.12);cx.beginPath();
  cx.moveTo(x,y-2);cx.lineTo(x+2,y);cx.lineTo(x,y+2);cx.lineTo(x-2,y);cx.closePath();cx.fill();
  cx.fillStyle=rgba(255,255,255,.03);cx.beginPath();cx.arc(x-1,y-1,.5,0,Math.PI*2);cx.fill()}
 for(let i=0;i<3;i++){cx.strokeStyle=rgba(br+20,bg+20,bb+20,.08);cx.lineWidth=.3;
  cx.beginPath();cx.moveTo(rn()*T,rn()*T);cx.lineTo(rn()*T,rn()*T);cx.stroke()}
}else if(fp==='checker'){
 const cs=T/4;for(let y=0;y<4;y++)for(let x=0;x<4;x++)if((x+y)%2===0){
  cx.fillStyle=rgba(th.fc[0],th.fc[1],th.fc[2],.3);cx.fillRect(x*cs,y*cs,cs,cs)}
 // Disco light reflection
 if(rn()<.15){const grd=cx.createRadialGradient(rn()*T,rn()*T,0,rn()*T,rn()*T,12);
  grd.addColorStop(0,rgba(th.ac[0],th.ac[1],th.ac[2],.06));grd.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=grd;cx.fillRect(0,0,T,T)}
}else if(fp==='gravel'){
 for(let i=0;i<35;i++){const dc=(rn()-.5)*14|0;
  cx.beginPath();cx.ellipse(rn()*T,rn()*T,.5+rn()*2,(.5+rn()*1.5)*(.4+rn()*.6),rn()*Math.PI,0,Math.PI*2);
  cx.fillStyle=rgb(br+dc,bg+dc,bb+dc);cx.fill()}
}else if(fp==='rustmetal'){
 for(let i=0;i<10;i++){const grd=cx.createRadialGradient(rn()*T,rn()*T,0,rn()*T,rn()*T,3+rn()*8);
  grd.addColorStop(0,rgba(th.fc[0]+15,th.fc[1],th.fc[2]-5,.15));grd.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=grd;cx.fillRect(0,0,T,T)}
 if(rn()<.3){const pts=[[5,5],[T-5,5],[5,T-5],[T-5,T-5]];for(const p of pts){
  cx.beginPath();cx.arc(p[0],p[1],2,0,Math.PI*2);cx.fillStyle=rgba(br+25,bg+18,bb+12,.35);ctx.fill;
  cx.fill();cx.beginPath();cx.arc(p[0]-.5,p[1]-.5,.8,0,Math.PI*2);cx.fillStyle=rgba(255,255,255,.06);cx.fill()}}
}
// Universal detail
if(rn()<.06){cx.beginPath();cx.arc(rn()*T,rn()*T,2+rn()*3,0,Math.PI*2);
 cx.fillStyle=rgba(br-8,bg-8,bb-8,.15);cx.fill()}
flC[k]=c;return c}

// ═══ WALL TEXTURES ═══
const wlC={};
function gWall(seed,li){
const k=seed*100+(li%THEMES.length)+50000;if(wlC[k])return wlC[k];
const c=document.createElement('canvas');c.width=T;c.height=T;
const cx=c.getContext('2d'),rn=mb(Math.abs(seed*1664525+1013904223)),th=gTh(li),w=th.wl;
cx.fillStyle=rgb(w[0],w[1],w[2]);cx.fillRect(0,0,T,T);
const wp=th.wp;
if(wp==='brick'||wp==='dirtybrick'){
 const bh=8,bw=16;
 for(let y=0;y<T;y+=bh){const off=(Math.floor(y/bh)%2)*(bw/2);
  for(let x=-bw;x<T+bw;x+=bw){const dc=(rn()-.5)*12|0;
   cx.fillStyle=rgb(w[0]+dc,w[1]+dc-3,w[2]+dc-5);cx.fillRect(x+off+1,y+1,bw-2,bh-2);
   // Brick highlight
   cx.fillStyle=rgba(255,255,255,.04);cx.fillRect(x+off+1,y+1,bw-2,1)}
  cx.fillStyle=rgba(w[0]-18,w[1]-15,w[2]-12,.45);cx.fillRect(0,y,T,1)}
 for(let y=0;y<T;y+=bh){const off=(Math.floor(y/bh)%2)*(bw/2);
  for(let x=-bw;x<T+bw;x+=bw){cx.fillStyle=rgba(w[0]-18,w[1]-15,w[2]-12,.45);cx.fillRect(x+off,y,1,bh)}}
 if(wp==='dirtybrick'){// Dirt stains
  for(let i=0;i<3;i++){const grd=cx.createRadialGradient(rn()*T,rn()*T,0,rn()*T,rn()*T,5+rn()*8);
   grd.addColorStop(0,rgba(w[0]-15,w[1]-10,w[2]-8,.12));grd.addColorStop(1,'rgba(0,0,0,0)');
   cx.fillStyle=grd;cx.fillRect(0,0,T,T)}}
}else if(wp==='wallpaper'){
 cx.fillStyle=rgba(w[0]+5,w[1]+5,w[2]+3,1);cx.fillRect(0,0,T,T);
 // Damask pattern
 const ps=10;for(let y=0;y<T;y+=ps)for(let x=0;x<T;x+=ps){
  cx.strokeStyle=rgba(th.ac[0],th.ac[1],th.ac[2],.06);cx.lineWidth=.5;
  cx.beginPath();cx.arc(x+ps/2,y+ps/2,3,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.moveTo(x+ps/2,y);cx.lineTo(x+ps,y+ps/2);cx.lineTo(x+ps/2,y+ps);cx.lineTo(x,y+ps/2);cx.closePath();cx.stroke()}
}else if(wp==='corrugated'){
 for(let y=0;y<T;y+=5){cx.fillStyle=rgba(w[0]+6,w[1]+6,w[2]+6,.3);cx.fillRect(0,y,T,2.5);
  cx.fillStyle=rgba(w[0]-6,w[1]-6,w[2]-6,.3);cx.fillRect(0,y+2.5,T,2.5)}
 if(rn()<.3){cx.beginPath();cx.arc(T/2,T/2,3,0,Math.PI*2);cx.fillStyle=rgba(w[0]+22,w[1]+22,w[2]+22,.35);cx.fill()}
}else if(wp==='ornate'){
 cx.fillStyle=rgba(w[0]+5,w[1]+3,w[2]+5,1);cx.fillRect(0,0,T,T);
 const ds=8;for(let y=0;y<T;y+=ds)for(let x=0;x<T;x+=ds){
  cx.strokeStyle=rgba(th.ac[0],th.ac[1],th.ac[2],.07);cx.lineWidth=.4;
  cx.beginPath();cx.moveTo(x+ds/2,y);ctx.lineTo;cx.lineTo(x+ds,y+ds/2);cx.lineTo(x+ds/2,y+ds);cx.lineTo(x,y+ds/2);cx.closePath();cx.stroke()}
}else if(wp==='neonwall'){
 if(rn()<.25){const gy=rn()*T|0;const grd=cx.createLinearGradient(0,gy-4,0,gy+4);
  grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(.5,rgba(th.ac[0],th.ac[1],th.ac[2],.12));grd.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=grd;cx.fillRect(0,gy-4,T,8)}
}else if(wp==='cinderblock'){
 const bh=20;for(let y=0;y<T;y+=bh){const off=(Math.floor(y/bh)%2)*20;
  for(let x=-20;x<T+20;x+=T){const dc=(rn()-.5)*8|0;cx.fillStyle=rgb(w[0]+dc,w[1]+dc,w[2]+dc);cx.fillRect(x+off+1,y+1,T-2,bh-2)}
  cx.fillStyle=rgba(w[0]-12,w[1]-12,w[2]-12,.4);cx.fillRect(0,y,T,1)}
}else if(wp==='industrial'){
 for(let i=0;i<8;i++){const dc=(rn()-.5)*10|0;cx.fillStyle=rgba(w[0]+dc,w[1]+dc,w[2]+dc,.2);
  cx.fillRect(rn()*T|0,rn()*T|0,2+rn()*4|0,2+rn()*4|0)}
 if(rn()<.2){cx.fillStyle=rgba(w[0]+20,w[1]+15,w[2]+10,.4);cx.fillRect(0,T/2-3,T,6);
  cx.fillStyle=rgba(255,255,255,.04);cx.fillRect(0,T/2-3,T,1)}}
// 3D edges
cx.fillStyle=rgba(th.wt[0],th.wt[1],th.wt[2],.3);cx.fillRect(0,0,T,2);cx.fillRect(0,0,1,T);
cx.fillStyle=rgba(th.ws[0],th.ws[1],th.ws[2],.35);cx.fillRect(0,T-2,T,2);cx.fillRect(T-1,0,1,T);
wlC[k]=c;return c}

// Carpet
const cpC={};
function gCarpet(seed,li){
const th=gTh(li);if(!th.cpt)return null;
const k=seed*100+(li%THEMES.length)+99000;if(cpC[k])return cpC[k];
const c=document.createElement('canvas');c.width=T;c.height=T;const cx=c.getContext('2d'),rn=mb(Math.abs(seed*48271)),cc=th.cc;
cx.fillStyle=rgba(cc[0],cc[1],cc[2],.65);cx.fillRect(0,0,T,T);
for(let i=0;i<40;i++){const dc=(rn()-.5)*8|0;cx.fillStyle=rgba(cc[0]+dc,cc[1]+dc,cc[2]+dc,.12);
 cx.fillRect(rn()*T|0,rn()*T|0,1,1+rn()*2|0)}
const ps=12;for(let y=0;y<T;y+=ps)for(let x=0;x<T;x+=ps){
 cx.strokeStyle=rgba(cc[0]+20,cc[1]+20,cc[2]+20,.08);cx.lineWidth=.4;
 cx.beginPath();cx.arc(x+ps/2,y+ps/2,3,0,Math.PI*2);cx.stroke()}
cpC[k]=c;return c}

class Corpse{
 constructor(x,y,angle,skinColor,bodyColor){
  this.x=x;this.y=y;this.angle=angle+(Math.random()-.5)*.8;
  this.skin=skinColor;this.body=bodyColor;
  this.life=6;this.maxLife=6;this.alpha=1;

 }
 update(dt){
  this.life-=dt;
  this.alpha=cl(this.life/1.5,0,1);// Fade in last 1.5s
  this.bloodPool=Math.min(this.maxBlood,this.bloodPool+dt*6);
 }
 get alive(){return this.life>0}
 draw(cam){
  if(this.life<=0)return;
  const sx=this.x-cam[0],sy=this.y-cam[1];
  ctx.globalAlpha=this.alpha;
  // Blood pool expanding
  if(this.bloodPool>1){
   ctx.beginPath();ctx.ellipse(sx+2,sy+2,this.bloodPool*1.2,this.bloodPool*.8,this.angle*.3,0,Math.PI*2);
   ctx.fillStyle='#600';ctx.fill();

   ctx.fillStyle='#800';ctx.fill()
  }
  ctx.save();ctx.translate(sx,sy);ctx.rotate(this.angle);
  // Legs splayed
  const lo=this.limbOffsets;
  ctx.fillStyle=this.body;
  ctx.save();ctx.translate(-2,-5);ctx.rotate(lo[0].a);
  ctx.fillRect(-1.5,0,3,8);ctx.beginPath();ctx.ellipse(1,8,3,2,0,0,Math.PI*2);ctx.fillStyle='#333';ctx.fill();ctx.restore();

  // Torso
  ctx.beginPath();ctx.ellipse(0,0,6,7,0,0,Math.PI*2);ctx.fillStyle=this.body;ctx.fill();
  // Arms splayed
  ctx.fillStyle=this.skin;
  ctx.save();ctx.translate(3,-6);ctx.rotate(lo[2].a);ctx.fillRect(0,-1.5,lo[2].d,3);
  ctx.beginPath();ctx.arc(lo[2].d,0,2.5,0,Math.PI*2);ctx.fill();ctx.restore();

  ctx.strokeStyle='#600';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(3,-3);ctx.lineTo(5,-1);ctx.moveTo(5,-3);ctx.lineTo(3,-1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(3,1);ctx.lineTo(5,3);ctx.moveTo(5,1);ctx.lineTo(3,3);ctx.stroke();
  ctx.restore();
  ctx.globalAlpha=1;
 }
}

const smW=120,smX=20,smY=H-50;ctx.fillStyle='#222';ctx.fillRect(smX,smY,smW,8);ctx.fillStyle=G.sm.on?'#44f':'#66c';ctx.fillRect(smX,smY,(smW*G.sm.ch/G.sm.mx)|0,8);ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(smX,smY,smW,8);ctx.font='10px monospace';ctx.fillStyle='#aaa';ctx.textAlign='left';ctx.fillText('SHIFT: SLOW-MO',smX,smY-12);
const ww=G.wp();if(ww){const info=ww.info;ctx.textAlign='right';ctx.font='bold 22px monospace';ctx.fillStyle=info.cl;ctx.fillText(info.nm,W-20,H-100);if(ww.ms>0){let ac2,astr;if(ww.mg===0&&ww.rs===0){ac2=(G.t*4|0)%2?'#f32':'#640000';astr='NO AMMO'}else if(ww.mg===0){ac2='#ff0';astr=`${ww.mg}/${ww.ms} R:${ww.rs}`}else{ac2='#fff';astr=`${ww.mg}/${ww.ms} R:${ww.rs}`}ctx.fillStyle=ac2;ctx.fillText(astr,W-20,H-73);if(ww.rl){const bw=180;ctx.fillStyle='#281e32';ctx.fillRect(W-20-bw,H-42,bw,10);ctx.fillStyle='#ff0';ctx.fillRect(W-20-bw,H-42,(bw*ww.rP)|0,10)}}else{ctx.fillStyle=info.cl;ctx.fillText("MELEE",W-20,H-73)}ctx.font='15px monospace';let iy=H-110;for(const wn of Object.keys(G.wps)){ctx.fillStyle=wn===G.cw?'#fff':'#504658';ctx.fillText(`${wn===G.cw?'▶':' '} ${WPN[wn].nm}`,W-20,iy);iy-=20}}

sts.go={bg:null,k:0,tot:0,lv:0,sc:0,t:0,btns:[],enter(p){canvas.style.cursor='default';this.bg=this.bg||new MBg;this.k=p.k||0;this.tot=p.tot||0;this.lv=p.lv||0;this.sc=p.sc||0;this.t=0;const bw=250,bh=50;this.btns=[new Btn(W/2-bw/2,H/2+100,bw,bh,"RETRY",()=>chg('game',{level:this.lv}),{fs:26,tc:'#0ff',bc:'#0ff'}),new Btn(W/2-bw/2,H/2+170,bw,bh,"MENU",()=>chg('menu'),{fs:26,tc:'#f08',bc:'#f08'})]},exit(){},handleEvents(ev){const mp=[mouse.x,mouse.y],mb=mouse.btn;for(const b of this.btns)b.update(mp,mb,ev,0);for(const e of ev)if(e.t==='kd'){if(e.c==='Escape')chg('menu');if(e.c==='Enter'||e.c==='KeyR')chg('game',{level:this.lv})}},update(dt){this.t+=dt;this.bg.update(dt);const mp=[mouse.x,mouse.y],mb=mouse.btn;for(const b of this.btns)b.update(mp,mb,[],dt)},draw(){this.bg.draw();ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold 64px monospace';ctx.fillStyle=rgb(...cL(hx('#f32'),hx('#f08'),(Math.sin(this.t*3)+1)/2));ctx.fillText("GAME OVER",W/2,H*.25);ctx.font='28px monospace';ctx.fillStyle='#fff';ctx.fillText(`Kills:${this.k}/${this.tot} Score:${this.sc}`,W/2,H*.38);const ratio=this.k/Math.max(this.tot,1);let rk,rcol;if(ratio>=1){rk='S';rcol='#ff0'}else if(ratio>=.8){rk='A';rcol='#3f6'}else if(ratio>=.5){rk='B';rcol='#0ff'}else{rk='C';rcol='#f08'}ctx.font='bold 48px monospace';ctx.fillStyle=rcol;ctx.fillText(`GRADE: ${rk}`,W/2,H*.47);for(const b of this.btns)b.draw()}};

function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;canvas.style.width=W+'px';canvas.style.height=H+'px';vigC=null;if(cur===sts.menu)sts.menu._mk();if(cur===sts.opts)sts.opts.enter()}

function loop(now){const raw=(now-lastT)/1e3;lastT=now;const dt=Math.min(raw,.05);fC++;fT+=dt;if(fT>=1){dF=fC;fC=0;fT-=1}const ev=[...evQ];evQ=[];if(cur){cur.handleEvents(ev);cur.update(dt);cur.draw()}if(Cfg.showFps){ctx.font='bold 16px monospace';ctx.fillStyle='#3f6';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(`FPS: ${dF}`,W-100,10)}requestAnimationFrame(loop)}
